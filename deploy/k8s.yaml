apiVersion: apps/v1
kind: Deployment
metadata: { name: oraclewatch, labels: { app: oraclewatch } }
spec:
  replicas: 1
  selector: { matchLabels: { app: oraclewatch } }
  template:
    metadata: { labels: { app: oraclewatch } }
    spec:
      containers:
        - name: oraclewatch
          image: ghcr.io/cognis-digital/oraclewatch:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: oraclewatch }
spec:
  selector: { app: oraclewatch }
  ports: [{ port: 80, targetPort: 8000 }]
